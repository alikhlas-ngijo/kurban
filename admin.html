<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Kurban - Masjid Al-Ikhlas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f0f2f5; }
        .sidebar { background: #1e3a2f; min-height: 100vh; color: white; display: flex; flex-direction: column; }
        .sidebar a { color: #ddd; text-decoration: none; display: block; padding: 12px 20px; transition: 0.2s; }
        .sidebar a:hover, .sidebar a.active { background: #2d6a4f; color: white; border-radius: 8px; }
        .content { padding: 20px; }
        .card-stats { border-radius: 20px; border: none; background: white; }
        .btn-confirm { background: #1b4d3e; color: white; border: none; }
        .btn-confirm:hover { background: #0e3a2e; }
        .table-responsive { overflow-x: auto; }
        .modal-header { background: #1e3a2f; color: white; }
        .user-info { margin-top: auto; padding: 15px 20px; border-top: 1px solid #2d6a4f; font-size: 14px; }
        .loading-spinner { display: inline-block; width: 1.5rem; height: 1.5rem; border: 3px solid #f3f3f3; border-top: 3px solid #1b4d3e; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 col-lg-2 sidebar p-3">
            <h4 class="mb-4"><i class="fas fa-mosque"></i> Admin Kurban</h4>
            <nav>
                <a href="#" data-page="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="#" data-page="pendaftar"><i class="fas fa-user-clock"></i> Pendaftar</a>
                <a href="#" data-page="pekurban"><i class="fas fa-user-check"></i> Pekurban</a>
                <a href="#" data-page="hewan"><i class="fas fa-paw"></i> Hewan</a>
                <a href="#" data-page="penerima"><i class="fas fa-users"></i> Penerima</a>
                <a href="#" data-page="distribusi"><i class="fas fa-truck"></i> Distribusi</a>
                <a href="#" data-page="laporan"><i class="fas fa-file-alt"></i> Laporan</a>
                <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
            <div class="user-info">
                <i class="fas fa-user-circle"></i> Login sebagai: <strong id="userRoleDisplay"></strong>
            </div>
        </div>
        <div class="col-md-9 col-lg-10 content" id="mainContent">
            <div id="loading" class="text-center p-5"><div class="loading-spinner"></div> Memuat...</div>
        </div>
    </div>
</div>

<!-- Modal untuk tambah/edit hewan -->
<div class="modal fade" id="hewanModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="hewanModalLabel">Tambah Hewan</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="hewanId">
                <div class="mb-2"><label>Jenis</label><input type="text" id="jenisHewan" class="form-control" required></div>
                <div class="mb-2"><label>Berat (kg)</label><input type="number" id="beratHewan" class="form-control"></div>
                <div class="mb-2"><label>Harga (Rp)</label><input type="number" id="hargaHewan" class="form-control" required></div>
                <div class="mb-2"><label>Status</label><select id="statusHewan" class="form-control"><option value="Tersedia">Tersedia</option><option value="Terjual">Terjual</option></select></div>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button><button type="button" id="simpanHewanBtn" class="btn btn-success">Simpan</button></div>
        </div>
    </div>
</div>

<!-- Modal untuk tambah/edit penerima -->
<div class="modal fade" id="penerimaModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="penerimaModalLabel">Tambah Penerima</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="penerimaId">
                <div class="mb-2"><label>RT</label><select id="penerimaRt" class="form-control"><option value="3">RT 03</option><option value="4">RT 04</option><option value="5">RT 05</option><option value="6">RT 06</option></select></div>
                <div class="mb-2"><label>Nama Lengkap</label><input type="text" id="penerimaNama" class="form-control" required></div>
                <div class="mb-2"><label>Alamat</label><textarea id="penerimaAlamat" class="form-control" rows="2" required></textarea></div>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button><button type="button" id="simpanPenerimaBtn" class="btn btn-success">Simpan</button></div>
        </div>
    </div>
</div>

<!-- Modal untuk detail distribusi & checklist -->
<div class="modal fade" id="distribusiModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Detail Distribusi RT <span id="modalRtNumber"></span></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="penerimaChecklist"></div>
                <div class="mt-3"><label>Status Distribusi</label><select id="statusDistribusiSelect" class="form-control"><option value="Belum dimulai">Belum dimulai</option><option value="Distribusi Berjalan">Distribusi Berjalan</option><option value="Selesai">Selesai</option></select></div>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-primary" id="simpanChecklistBtn">Simpan Perubahan</button></div>
        </div>
    </div>
</div>

<!-- Modal Impor CSV Penerima -->
<div class="modal fade" id="imporCSVModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Impor CSV Penerima</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3"><label>Pilih RT</label><select id="csvRt" class="form-control"><option value="3">RT 03</option><option value="4">RT 04</option><option value="5">RT 05</option><option value="6">RT 06</option></select></div>
                <div class="mb-3"><label>File CSV (format: nama,alamat)</label><input type="file" id="csvFile" class="form-control" accept=".csv"></div>
                <div class="alert alert-info">Baris pertama header (diabaikan). Contoh:<br>Nama,Alamat<br>Bapak Slamet,Jl. Mawar No.10</div>
                <div id="importResult"></div>
            </div>
            <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button><button type="button" id="uploadCSVBtn" class="btn btn-success">Upload</button></div>
        </div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function() {
        if (!requireAuth(['admin'])) return;
        const user = getUser();
        if (user) document.getElementById('userRoleDisplay').innerText = (user.role === 'admin') ? 'Admin (Superuser)' : `Petugas RT ${user.rt || ''}`;
        loadDashboard();
    })();

    async function loadDashboard() {
        showLoading('Memuat dashboard...');
        const data = await apiCall('getDashboard');
        if (data.status === 'success') {
            document.getElementById('mainContent').innerHTML = `
                <div class="row">
                    <div class="col-md-3 mb-3"><div class="card card-stats p-3"><h5>Menunggu Konfirmasi</h5><h2>${data.totalPendaftar}</h2></div></div>
                    <div class="col-md-3 mb-3"><div class="card card-stats p-3"><h5>Sudah Lunas</h5><h2>${data.totalLunas}</h2></div></div>
                    <div class="col-md-3 mb-3"><div class="card card-stats p-3"><h5>Hewan Tersedia</h5><h2>${data.totalHewan}</h2></div></div>
                    <div class="col-md-3 mb-3"><div class="card card-stats p-3"><h5>Distribusi Aktif</h5><h2>${data.totalDistribusi}</h2></div></div>
                </div>`;
        } else { showError(data.message); if (data.message === 'Unauthorized') logoutToIndex(); }
    }

    async function loadPendaftar() {
        showLoading('Memuat data pendaftar...');
        const res = await apiCall('getPendaftar');
        if (res.status === 'success') {
            if (!res.data.length) { showInfo('Tidak ada pendaftar yang menunggu konfirmasi.'); return; }
            let html = `<div class="card p-3"><h3>Daftar Pendaftar (Menunggu Konfirmasi)</h3><div class="table-responsive"><table class="table table-striped"><thead class="table-success"><tr><th>Nama</th><th>Hewan</th><th>Atas Nama</th><th>Kelompok</th><th>Total Bayar</th><th>Status</th><th>Aksi</th></tr></thead><tbody>`;
            res.data.forEach(p => { html += `<tr><td>${escapeHtml(p.nama)}</td><td>${escapeHtml(p.jenisHewan)} (${p.jumlahHewan})</td><td>${escapeHtml(p.atasNama || '-')}</td><td>${p.kelompokNama ? escapeHtml(p.kelompokNama) : '-'}</td><td>Rp${Number(p.totalBayar).toLocaleString()}</td><td><span class="badge bg-warning">${p.statusPembayaran}</span></td><td><button class="btn btn-sm btn-confirm" onclick="confirmPayment('${p.id}')">Konfirmasi</button></td></tr>`; });
            html += `</tbody></table></div></div>`;
            document.getElementById('mainContent').innerHTML = html;
        } else { showError(res.message); if (res.message === 'Unauthorized') logoutToIndex(); }
    }
    window.confirmPayment = async (id) => {
        if (!confirm('Konfirmasi pembayaran ini?')) return;
        const res = await apiCall('confirmPembayaran', { id });
        if (res.status === 'success') { alert('Berhasil dikonfirmasi!'); loadPendaftar(); } else { alert('Gagal: ' + res.message); if (res.message === 'Unauthorized') logoutToIndex(); }
    };

    async function loadPekurban() {
        showLoading('Memuat data pekurban...');
        const res = await apiCall('getPekurban');
        if (res.status === 'success') {
            if (!res.data.length) { showInfo('Belum ada pekurban yang sudah dikonfirmasi.'); return; }
            let html = `<div class="card p-3"><h3>Daftar Pekurban (Sudah Lunas)</h3><div class="table-responsive"><table class="table table-striped"><thead class="table-success"><tr><th>Nama</th><th>Hewan</th><th>Atas Nama</th><th>Kelompok</th><th>Total Bayar</th><th>Status</th></tr></thead><tbody>`;
            res.data.forEach(p => { html += `<tr><td>${escapeHtml(p.nama)}</td><td>${escapeHtml(p.jenisHewan)} (${p.jumlahHewan})</td><td>${escapeHtml(p.atasNama || '-')}</td><td>${p.kelompokNama ? escapeHtml(p.kelompokNama) : '-'}</td><td>Rp${Number(p.totalBayar).toLocaleString()}</td><td><span class="badge bg-success">${p.statusPembayaran}</span></td></tr>`; });
            html += `</tbody></table></div></div>`;
            document.getElementById('mainContent').innerHTML = html;
        } else { showError(res.message); if (res.message === 'Unauthorized') logoutToIndex(); }
    }

    async function loadHewan() {
        showLoading('Memuat data hewan...');
        const res = await apiCall('getHewan');
        if (res.status === 'success') {
            let html = `<div class="card p-3"><h3>Hewan Kurban</h3><button class="btn btn-success mb-3" onclick="openHewanModal()">+ Tambah Hewan</button><div class="table-responsive"><table class="table table-striped"><thead class="table-success"><tr><th>Jenis</th><th>Berat (kg)</th><th>Harga</th><th>Status</th><th>Aksi</th></tr></thead><tbody>`;
            res.data.forEach(h => { html += `<tr><td>${escapeHtml(h.jenis)}</td><td>${h.berat || '-'}</td><td>Rp${Number(h.harga).toLocaleString()}</td><td>${h.status}</td><td><button class="btn btn-sm btn-warning" onclick="editHewan('${h.id}','${escapeHtml(h.jenis)}','${h.berat || ''}','${h.harga}','${h.status}')">Edit</button> <button class="btn btn-sm btn-danger" onclick="deleteHewan('${h.id}')">Hapus</button></td></tr>`; });
            html += `</tbody></table></div></div>`;
            document.getElementById('mainContent').innerHTML = html;
        } else { showError(res.message); if (res.message === 'Unauthorized') logoutToIndex(); }
    }
    let currentEditId = null;
    window.openHewanModal = (id = null) => {
        currentEditId = id;
        if (id) document.getElementById('hewanModalLabel').innerText = 'Edit Hewan';
        else { document.getElementById('hewanModalLabel').innerText = 'Tambah Hewan'; document.getElementById('hewanId').value = ''; document.getElementById('jenisHewan').value = ''; document.getElementById('beratHewan').value = ''; document.getElementById('hargaHewan').value = ''; document.getElementById('statusHewan').value = 'Tersedia'; }
        new bootstrap.Modal(document.getElementById('hewanModal')).show();
    };
    window.editHewan = (id, jenis, berat, harga, status) => { document.getElementById('hewanId').value = id; document.getElementById('jenisHewan').value = jenis; document.getElementById('beratHewan').value = berat; document.getElementById('hargaHewan').value = harga; document.getElementById('statusHewan').value = status; openHewanModal(id); };
    window.deleteHewan = async (id) => { if (!confirm('Yakin hapus?')) return; const res = await apiCall('deleteHewan', { id }); if (res.status === 'success') { alert('Hewan dihapus'); loadHewan(); } else { alert('Gagal: ' + res.message); if (res.message === 'Unauthorized') logoutToIndex(); } };
    document.getElementById('simpanHewanBtn').addEventListener('click', async () => { const id = document.getElementById('hewanId').value; const payload = { jenis: document.getElementById('jenisHewan').value, berat: document.getElementById('beratHewan').value, harga: document.getElementById('hargaHewan').value, status: document.getElementById('statusHewan').value }; let res; if (id) { payload.id = id; res = await apiCall('updateHewan', payload); } else { res = await apiCall('addHewan', payload); } if (res.status === 'success') { alert(id ? 'Update berhasil' : 'Hewan ditambahkan'); bootstrap.Modal.getInstance(document.getElementById('hewanModal')).hide(); loadHewan(); } else { alert('Gagal: ' + res.message); if (res.message === 'Unauthorized') logoutToIndex(); } });

    // ======================= MANAJEMEN PENERIMA =======================
    async function loadPenerima() {
        showLoading('Memuat data penerima...');
        const res = await apiCall('getAllPenerima');
        if (res.status === 'success') {
            let html = `<div class="card p-3"><h3>Daftar Penerima Daging Kurban</h3>
                        <div class="mb-3"><button class="btn btn-success me-2" onclick="openPenerimaModal()">+ Tambah Penerima</button>
                        <button class="btn btn-info" onclick="openImporCSV()"><i class="fas fa-upload"></i> Impor CSV</button></div>
                        <div class="table-responsive"><table class="table table-striped">
                        <thead class="table-success"><tr><th>RT</th><th>Nama</th><th>Alamat</th><th>Aksi</th></tr></thead><tbody>`;
            res.data.forEach(p => { html += `<tr><td>RT ${p.rt}</td><td>${escapeHtml(p.nama)}</td><td>${escapeHtml(p.alamat)}</td><td><button class="btn btn-sm btn-warning" onclick="editPenerima('${p.id}','${p.rt}','${escapeHtml(p.nama)}','${escapeHtml(p.alamat)}')">Edit</button> <button class="btn btn-sm btn-danger" onclick="deletePenerima('${p.id}')">Hapus</button></td></tr>`; });
            html += `</tbody></table></div></div>`;
            document.getElementById('mainContent').innerHTML = html;
        } else { showError(res.message); if (res.message === 'Unauthorized') logoutToIndex(); }
    }
    window.openPenerimaModal = (id = null) => {
        if (id) document.getElementById('penerimaModalLabel').innerText = 'Edit Penerima';
        else { document.getElementById('penerimaModalLabel').innerText = 'Tambah Penerima'; document.getElementById('penerimaId').value = ''; document.getElementById('penerimaRt').value = '3'; document.getElementById('penerimaNama').value = ''; document.getElementById('penerimaAlamat').value = ''; }
        new bootstrap.Modal(document.getElementById('penerimaModal')).show();
    };
    window.editPenerima = (id, rt, nama, alamat) => { document.getElementById('penerimaId').value = id; document.getElementById('penerimaRt').value = rt; document.getElementById('penerimaNama').value = nama; document.getElementById('penerimaAlamat').value = alamat; openPenerimaModal(id); };
    window.deletePenerima = async (id) => { if (!confirm('Yakin hapus penerima ini?')) return; const res = await apiCall('deletePenerima', { id }); if (res.status === 'success') { alert('Penerima dihapus'); loadPenerima(); } else { alert('Gagal: ' + res.message); if (res.message === 'Unauthorized') logoutToIndex(); } };
    document.getElementById('simpanPenerimaBtn').addEventListener('click', async () => { const id = document.getElementById('penerimaId').value; const payload = { rt: document.getElementById('penerimaRt').value, nama: document.getElementById('penerimaNama').value, alamat: document.getElementById('penerimaAlamat').value }; let res; if (id) { payload.id = id; res = await apiCall('updatePenerima', payload); } else { res = await apiCall('addPenerima', payload); } if (res.status === 'success') { alert(id ? 'Penerima diupdate' : 'Penerima ditambahkan'); bootstrap.Modal.getInstance(document.getElementById('penerimaModal')).hide(); loadPenerima(); } else { alert('Gagal: ' + res.message); if (res.message === 'Unauthorized') logoutToIndex(); } });

    // ======================= DISTRIBUSI =======================
    async function loadDistribusi() {
        showLoading('Memuat data distribusi...');
        const res = await apiCall('getDistribusi');
        if (res.status === 'success') {
            if (!res.data.length) {
                let btnHtml = `<div class="card p-3"><h3>Distribusi per RT</h3><div class="mb-3"><button class="btn btn-primary me-2" onclick="initDistribusiAll()">Inisialisasi Distribusi</button></div><div class="alert alert-info">Belum ada data distribusi. Klik tombol di atas untuk membuat distribusi untuk RT 3-6.</div></div>`;
                document.getElementById('mainContent').innerHTML = btnHtml;
                return;
            }
            let html = `<div class="card p-3"><h3>Distribusi per RT</h3><div class="mb-3"><button class="btn btn-primary me-2" onclick="initDistribusiAll()">Buat/Perbarui Distribusi</button></div><div class="table-responsive"><table class="table table-striped"><thead class="table-success"><tr><th>RT</th><th>Status</th><th>Tanggal Distribusi</th><th>Aksi</th></tr></thead><tbody>`;
            res.data.forEach(d => { html += `<tr><td>RT ${d.rt}</td><td><span class="badge ${d.status === 'Selesai' ? 'bg-success' : (d.status === 'Distribusi Berjalan' ? 'bg-warning' : 'bg-secondary')}">${d.status}</span></td><td>${d.tanggalDistribusi ? new Date(d.tanggalDistribusi).toLocaleDateString() : '-'}</td><td><button class="btn btn-sm btn-info" onclick="viewChecklist('${d.id}', '${d.rt}')">Kelola Checklist</button></td></tr>`; });
            html += `</tbody></table></div></div>`;
            document.getElementById('mainContent').innerHTML = html;
        } else { showError(res.message); if (res.message === 'Unauthorized') logoutToIndex(); }
    }
    window.initDistribusiAll = async () => { const res = await apiCall('initDistribusiAll'); if (res.status === 'success') { alert('Distribusi berhasil diinisialisasi'); loadDistribusi(); } else { alert('Gagal: ' + res.message); if (res.message === 'Unauthorized') logoutToIndex(); } };
    let currentDistribusiId = null, currentRt = null;
    window.viewChecklist = async (idDistribusi, rt) => {
        currentDistribusiId = idDistribusi; currentRt = rt;
        document.getElementById('modalRtNumber').innerText = rt;
        const penerimaRes = await apiCall('getPenerimaRT', { rt: rt });
        if (penerimaRes.status !== 'success') { alert('Gagal memuat daftar penerima'); return; }
        let checklist = {};
        const distribusiRes = await apiCall('getDistribusi');
        const distribusi = distribusiRes.data.find(d => d.id === idDistribusi);
        if (distribusi && distribusi.checklistJson) { try { checklist = JSON.parse(distribusi.checklistJson); } catch(e) {} }
        let html = `<h6>Daftar Penerima RT ${rt}</h6><ul class="list-group">`;
        if (penerimaRes.data.length === 0) { html += `<li class="list-group-item text-muted">Belum ada data penerima. Silakan tambah di menu Penerima.</li>`; }
        else { penerimaRes.data.forEach(p => { const isChecked = checklist[p.id] === true; html += `<li class="list-group-item d-flex justify-content-between align-items-center"><div><strong>${escapeHtml(p.nama)}</strong><br><small>${escapeHtml(p.alamat)}</small></div><div class="form-check"><input type="checkbox" class="form-check-input penerima-check" data-id="${p.id}" ${isChecked ? 'checked' : ''}> <label class="form-check-label">Terima</label></div></li>`; }); }
        html += `</ul>`;
        document.getElementById('penerimaChecklist').innerHTML = html;
        if (distribusi) document.getElementById('statusDistribusiSelect').value = distribusi.status;
        new bootstrap.Modal(document.getElementById('distribusiModal')).show();
    };
    document.getElementById('simpanChecklistBtn').addEventListener('click', async () => { const checklist = {}; document.querySelectorAll('#penerimaChecklist .penerima-check').forEach(chk => { checklist[chk.dataset.id] = chk.checked; }); const status = document.getElementById('statusDistribusiSelect').value; const res = await apiCall('updateChecklist', { idDistribusi: currentDistribusiId, checklistJson: JSON.stringify(checklist), status: status }); if (res.status === 'success') { alert('Checklist disimpan'); bootstrap.Modal.getInstance(document.getElementById('distribusiModal')).hide(); loadDistribusi(); } else { alert('Gagal: ' + res.message); if (res.message === 'Unauthorized') logoutToIndex(); } });

    // ======================= IMPOR CSV =======================
    window.openImporCSV = () => { document.getElementById('csvFile').value = ''; document.getElementById('importResult').innerHTML = ''; new bootstrap.Modal(document.getElementById('imporCSVModal')).show(); };
    document.getElementById('uploadCSVBtn').addEventListener('click', async () => { const fileInput = document.getElementById('csvFile'); const rt = document.getElementById('csvRt').value; const file = fileInput.files[0]; if (!file) { alert('Pilih file CSV'); return; } const reader = new FileReader(); reader.onload = async (e) => { const res = await apiCall('importPenerimaCSV', { rt: rt, csvData: e.target.result }); if (res.status === 'success') { alert(`Berhasil mengimpor ${res.count} data untuk RT ${rt}`); bootstrap.Modal.getInstance(document.getElementById('imporCSVModal')).hide(); loadPenerima(); } else { alert('Gagal: ' + res.message); document.getElementById('importResult').innerHTML = `<div class="alert alert-danger">${res.message}</div>`; } }; reader.readAsText(file); });

    async function loadLaporan() {
        showLoading('Memuat laporan...');
        const res = await apiCall('getLaporan');
        if (res.status === 'success') {
            let html = `<div class="card p-3"><h3>Laporan Lengkap</h3><div class="mb-4"><h5>📋 Pendaftar Menunggu (${res.data.pendaftar.length})</h5><div class="table-responsive"><table class="table table-sm table-bordered"><thead class="table-warning"><tr><th>Nama</th><th>Hewan</th><th>Total Bayar</th><th>Status</th></tr></thead><tbody>${res.data.pendaftar.map(p => `<tr><td>${escapeHtml(p.nama)}</td><td>${escapeHtml(p.jenisHewan)}</td><td>Rp${Number(p.totalBayar).toLocaleString()}</td><td>${p.statusPembayaran}</td></tr>`).join('')}</tbody></table></div><h5>✅ Pekurban Lunas (${res.data.pekurban.length})</h5><div class="table-responsive"><table class="table table-sm table-bordered"><thead class="table-success"><tr><th>Nama</th><th>Hewan</th><th>Total Bayar</th></tr></thead><tbody>${res.data.pekurban.map(p => `<tr><td>${escapeHtml(p.nama)}</td><td>${escapeHtml(p.jenisHewan)}</td><td>Rp${Number(p.totalBayar).toLocaleString()}</td></tr>`).join('')}</tbody></table></div><h5>🚚 Distribusi (${res.data.distribusi.length})</h5><div class="table-responsive"><table class="table table-sm table-bordered"><thead class="table-info"><tr><th>RT</th><th>Status</th><th>Tanggal</th></tr></thead><tbody>${res.data.distribusi.map(d => `<tr><td>RT ${d.rt}</td><td>${d.status}</td><td>${d.tanggalDistribusi ? new Date(d.tanggalDistribusi).toLocaleDateString() : '-'}</td></tr>`).join('')}</tbody></table></div><button class="btn btn-primary" onclick="window.print()">Cetak Laporan</button></div>`;
            document.getElementById('mainContent').innerHTML = html;
        } else { showError(res.message); if (res.message === 'Unauthorized') logoutToIndex(); }
    }

    function showLoading(msg) { document.getElementById('mainContent').innerHTML = `<div class="text-center p-5"><div class="loading-spinner"></div> ${msg}</div>`; }
    function showError(msg) { document.getElementById('mainContent').innerHTML = `<div class="alert alert-danger">Gagal: ${msg}</div>`; }
    function showInfo(msg) { document.getElementById('mainContent').innerHTML = `<div class="alert alert-info">${msg}</div>`; }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    async function logoutToIndex() { await logout(); window.location.href = 'index.html'; }

    const pages = { dashboard: loadDashboard, pendaftar: loadPendaftar, pekurban: loadPekurban, hewan: loadHewan, penerima: loadPenerima, distribusi: loadDistribusi, laporan: loadLaporan };
    document.querySelectorAll('.sidebar a[data-page]').forEach(link => { link.addEventListener('click', (e) => { e.preventDefault(); document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active')); link.classList.add('active'); pages[link.dataset.page](); }); });
    document.getElementById('logoutBtn').addEventListener('click', async (e) => { e.preventDefault(); if (confirm('Logout?')) await logoutToIndex(); });
</script>
</body>
</html>
