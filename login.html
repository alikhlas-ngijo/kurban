<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login - Sistem Kurban Masjid Al-Ikhlas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e3a2f 0%, #2d6a4f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, system-ui;
            margin: 0;
            padding: 20px;
        }
        .login-card {
            max-width: 450px;
            width: 100%;
            border-radius: 30px;
            background: white;
            padding: 30px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .btn-login {
            background: #2d6a4f;
            color: white;
            border-radius: 50px;
            padding: 12px;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-login:hover { background: #1e3a2f; transform: translateY(-2px); }
        .form-control { border-radius: 50px; padding: 12px 20px; }
        .input-group-text { border-radius: 50px 0 0 50px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <i class="fas fa-mosque fa-3x text-success"></i>
            <h3 class="mt-2 fw-bold">Masjid Al-Ikhlas Ngijo</h3>
            <p class="text-muted">Sistem Manajemen Kurban 1447 H</p>
        </div>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fas fa-user"></i></span>
                    <input type="text" id="username" class="form-control" placeholder="Masukkan username" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fas fa-lock"></i></span>
                    <input type="password" id="password" class="form-control" placeholder="Masukkan password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-login w-100">
                <i class="fas fa-sign-in-alt me-2"></i> Masuk
            </button>
            <div id="loginError" class="mt-3 text-center text-danger small"></div>
        </form>
        <div class="text-center mt-4 small text-muted">
            <i class="fas fa-shield-alt"></i> Akses khusus Admin & Petugas RT<br>
            Hubungi pengurus masjid jika lupa kredensial.
        </div>
    </div>

    <!-- Scripts dengan path ke folder js/ -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Jika sudah login, redirect sesuai role
        (function() {
            if (typeof isLoggedIn !== 'undefined' && isLoggedIn()) {
                const user = getUser();
                if (user) {
                    if (user.role === 'admin') window.location.href = 'admin.html';
                    else if (user.role === 'rt') window.location.href = 'rt.html';
                    else logout();
                }
            }
        })();

        const form = document.getElementById('loginForm');
        const errorDiv = document.getElementById('loginError');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = form.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            
            // Reset error
            errorDiv.innerHTML = '';
            
            if (!username || !password) {
                errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Username dan password harus diisi!';
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Memproses...';
            
            try {
                const result = await login(username, password);
                console.log('Login result:', result);
                
                if (result.success) {
                    // Ambil ulang user dari localStorage untuk memastikan
                    const user = getUser();
                    console.log('User from storage:', user);
                    
                    if (user && user.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else if (user && user.role === 'rt') {
                        window.location.href = 'rt.html';
                    } else {
                        errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Role tidak valid. Hubungi admin.';
                        await logout();
                    }
                } else {
                    errorDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${result.message || 'Login gagal. Periksa username/password.'}`;
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            } catch (err) {
                console.error('Login exception:', err);
                errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Terjadi kesalahan koneksi. Coba lagi.';
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>
</body>
</html>
