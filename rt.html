<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RT Panel - Sistem Kurban</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f0f2f5; }
        .sidebar { background: #1e3a2f; min-height: 100vh; color: white; }
        .sidebar a { color: #ddd; display: block; padding: 12px 20px; text-decoration: none; border-radius: 8px; margin-bottom: 4px; }
        .sidebar a:hover, .sidebar a.active { background: #2d6a4f; color: white; }
        .content { padding: 20px; }
        .card-stats { border-radius: 20px; background: white; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .btn-rt { background: #1b4d3e; color: white; border: none; }
        .btn-rt:hover { background: #0e3a2e; color: white; }
        .loading-spinner { display: inline-block; width: 1.5rem; height: 1.5rem; border: 3px solid #e9ecef; border-top: 3px solid #1b4d3e; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .user-info { margin-top: auto; padding: 15px; border-top: 1px solid #2d6a4f; }
    </style>
</head>
<body>
<div class="container-fluid p-0">
    <div class="row g-0">
        <div class="col-md-3 col-lg-2 sidebar p-3">
            <h4><i class="fas fa-mosque"></i> RT Panel</h4>
            <nav class="mt-4">
                <a href="#" data-page="dashboard" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="#" data-page="penerima"><i class="fas fa-users"></i> Data Penerima</a>
                <a href="#" data-page="distribusi"><i class="fas fa-truck"></i> Distribusi</a>
                <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
            <div class="user-info">
                <i class="fas fa-user-circle"></i> Login sebagai: <strong id="userRoleDisplay"></strong>
            </div>
        </div>
        <div class="col-md-9 col-lg-10 content" id="mainContent">
            <div class="text-center p-5" id="loading"><div class="loading-spinner"></div> Memuat...</div>
        </div>
    </div>
</div>

<!-- Modal Penerima -->
<div class="modal fade" id="penerimaModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title" id="penerimaModalLabel">Tambah Penerima</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="penerimaId">
                <div class="mb-3"><label>Nama Lengkap</label><input type="text" id="penerimaNama" class="form-control" required></div>
                <div class="mb-3"><label>Alamat</label><textarea id="penerimaAlamat" class="form-control" rows="2" required></textarea></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                <button type="button" id="simpanPenerimaBtn" class="btn btn-rt">Simpan</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Distribusi & Checklist -->
<div class="modal fade" id="distribusiModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title">Distribusi RT <span id="modalRtNumber"></span></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="penerimaChecklist" style="max-height: 400px; overflow-y: auto;"></div>
                <div class="mt-3">
                    <label>Status Distribusi</label>
                    <select id="statusDistribusiSelect" class="form-select">
                        <option value="Belum dimulai">Belum dimulai</option>
                        <option value="Distribusi Berjalan">Distribusi Berjalan</option>
                        <option value="Selesai">Selesai</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button>
                <button type="button" id="simpanChecklistBtn" class="btn btn-rt">Simpan Checklist</button>
            </div>
        </div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
    (function() {
        if (typeof requireAuth === 'undefined') {
            alert('auth.js tidak dimuat. Periksa path js/');
            return;
        }
        // Hanya role rt yang diizinkan
        if (!requireAuth(['rt'])) return;
        const user = getUser();
        if (user && user.rt) {
            document.getElementById('userRoleDisplay').innerText = `Petugas RT ${user.rt}`;
        } else {
            document.getElementById('userRoleDisplay').innerText = 'Petugas RT (error)';
        }
        loadDashboard();
    })();

    function showLoading(msg = 'Memuat...') {
        document.getElementById('mainContent').innerHTML = `<div class="text-center p-5"><div class="loading-spinner"></div> ${msg}</div>`;
    }
    function showError(msg) {
        document.getElementById('mainContent').innerHTML = `<div class="alert alert-danger">${escapeHtml(msg)}</div>`;
    }
    function showInfo(msg) {
        document.getElementById('mainContent').innerHTML = `<div class="alert alert-info">${msg}</div>`;
    }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    async function handleUnauthorized(res) {
        if (res && (res.message === 'Unauthorized' || res.message === 'Session invalid')) {
            await logout();
            return true;
        }
        return false;
    }

    async function loadDashboard() {
        showLoading('Memuat dashboard...');
        const userRt = getUser().rt;
        const penerimaRes = await apiCall('getPenerimaRT', { rt: userRt });
        if (await handleUnauthorized(penerimaRes)) return;
        const jumlahPenerima = penerimaRes.status === 'success' ? penerimaRes.data.length : 0;
        const distribusiRes = await apiCall('getDistribusi');
        let statusDistribusi = 'Belum dimulai';
        if (distribusiRes.status === 'success') {
            const myDist = distribusiRes.data.find(d => String(d.rt) === String(userRt));
            if (myDist) statusDistribusi = myDist.status;
        }
        const html = `
            <div class="row g-4">
                <div class="col-md-4"><div class="card card-stats p-3"><h6>Penerima RT ${userRt}</h6><h2>${jumlahPenerima}</h2></div></div>
                <div class="col-md-4"><div class="card card-stats p-3"><h6>Status Distribusi</h6><h2 class="fs-4">${statusDistribusi}</h2></div></div>
                <div class="col-md-4"><div class="card card-stats p-3"><h6>Aksi Cepat</h6><button class="btn btn-sm btn-rt" onclick="loadPenerima()">Kelola Penerima</button> <button class="btn btn-sm btn-outline-success" onclick="loadDistribusi()">Distribusi</button></div></div>
            </div>`;
        document.getElementById('mainContent').innerHTML = html;
    }

    async function loadPenerima() {
        showLoading('Memuat data penerima...');
        const userRt = getUser().rt;
        const res = await apiCall('getPenerimaRT', { rt: userRt });
        if (await handleUnauthorized(res)) return;
        if (res.status !== 'success') return showError(res.message);
        const penerima = res.data;
        let html = `<div class="card"><div class="card-body"><h5>Daftar Penerima RT ${userRt}</h5><button class="btn btn-rt btn-sm mb-3" onclick="openPenerimaModal()">+ Tambah Penerima</button><div class="table-responsive"><table class="table table-bordered"><thead class="table-success"><tr><th>Nama</th><th>Alamat</th><th>Aksi</th></tr></thead><tbody>`;
        if (penerima.length === 0) html += '<tr><td colspan="3" class="text-center">Belum ada data</td></tr>';
        else {
            penerima.forEach(p => {
                html += `<tr>
                            <td>${escapeHtml(p.nama)}</td>
                            <td>${escapeHtml(p.alamat)}</td>
                            <td>
                                <button class="btn btn-sm btn-warning" onclick="editPenerima('${p.id}','${escapeHtml(p.nama)}','${escapeHtml(p.alamat)}')">Edit</button>
                                <button class="btn btn-sm btn-danger" onclick="deletePenerima('${p.id}')">Hapus</button>
                            </td>
                         </tr>`;
            });
        }
        html += `</tbody></table></div></div></div>`;
        document.getElementById('mainContent').innerHTML = html;
    }

    window.openPenerimaModal = (id = null) => {
        if (id) document.getElementById('penerimaModalLabel').innerText = 'Edit Penerima';
        else {
            document.getElementById('penerimaModalLabel').innerText = 'Tambah Penerima';
            document.getElementById('penerimaId').value = '';
            document.getElementById('penerimaNama').value = '';
            document.getElementById('penerimaAlamat').value = '';
        }
        new bootstrap.Modal(document.getElementById('penerimaModal')).show();
    };
    window.editPenerima = (id, nama, alamat) => {
        document.getElementById('penerimaId').value = id;
        document.getElementById('penerimaNama').value = nama;
        document.getElementById('penerimaAlamat').value = alamat;
        openPenerimaModal(id);
    };
    window.deletePenerima = async (id) => {
        if (!confirm('Hapus penerima ini?')) return;
        const res = await apiCall('deletePenerima', { id });
        if (res.status === 'success') { alert('Terhapus'); loadPenerima(); }
        else alert('Gagal: ' + res.message);
    };
    document.getElementById('simpanPenerimaBtn').addEventListener('click', async () => {
        const id = document.getElementById('penerimaId').value;
        const nama = document.getElementById('penerimaNama').value.trim();
        const alamat = document.getElementById('penerimaAlamat').value.trim();
        if (!nama || !alamat) return alert('Isi semua field');
        let res;
        if (id) res = await apiCall('updatePenerima', { id, nama, alamat });
        else res = await apiCall('addPenerima', { nama, alamat });
        if (res.status === 'success') {
            alert(id ? 'Update berhasil' : 'Ditambahkan');
            bootstrap.Modal.getInstance(document.getElementById('penerimaModal')).hide();
            loadPenerima();
        } else alert('Gagal: ' + res.message);
    });

    async function loadDistribusi() {
        showLoading('Memuat distribusi...');
        const userRt = getUser().rt;
        const res = await apiCall('getDistribusi');
        if (await handleUnauthorized(res)) return;
        const myDist = res.data.find(d => String(d.rt) === String(userRt));
        if (!myDist) return showInfo(`Belum ada data distribusi untuk RT ${userRt}. Hubungi admin.`);
        const statusBadge = myDist.status === 'Selesai' ? 'bg-success' : (myDist.status === 'Distribusi Berjalan' ? 'bg-warning' : 'bg-secondary');
        const html = `<div class="card"><div class="card-body"><h5>Distribusi RT ${userRt}</h5><p>Status: <span class="badge ${statusBadge}">${myDist.status}</span></p><button class="btn btn-rt" onclick="viewChecklist('${myDist.id}', '${userRt}')">Kelola Checklist</button></div></div>`;
        document.getElementById('mainContent').innerHTML = html;
    }

    window.viewChecklist = async (idDistribusi, rt) => {
        const penerimaRes = await apiCall('getPenerimaRT', { rt });
        if (penerimaRes.status !== 'success') return alert('Gagal ambil penerima');
        const distribusiRes = await apiCall('getDistribusi');
        const distribusiData = distribusiRes.data.find(d => d.id === idDistribusi);
        let checklist = {};
        if (distribusiData && distribusiData.checklistJson) try { checklist = JSON.parse(distribusiData.checklistJson); } catch(e) {}
        document.getElementById('modalRtNumber').innerText = rt;
        let html = '<ul class="list-group">';
        penerimaRes.data.forEach(p => {
            const checked = checklist[p.id] === true;
            html += `<li class="list-group-item d-flex justify-content-between">
                        <div><strong>${escapeHtml(p.nama)}</strong><br><small>${escapeHtml(p.alamat)}</small></div>
                        <div class="form-check form-switch">
                            <input class="form-check-input penerima-check" type="checkbox" data-id="${p.id}" ${checked ? 'checked' : ''}>
                            <label>Sudah terima</label>
                        </div>
                    </li>`;
        });
        html += '</ul>';
        document.getElementById('penerimaChecklist').innerHTML = html;
        document.getElementById('statusDistribusiSelect').value = distribusiData ? distribusiData.status : 'Belum dimulai';
        window._currentDistribusiId = idDistribusi;
        new bootstrap.Modal(document.getElementById('distribusiModal')).show();
    };
    document.getElementById('simpanChecklistBtn').addEventListener('click', async () => {
        const checklist = {};
        document.querySelectorAll('#penerimaChecklist .penerima-check').forEach(chk => { checklist[chk.dataset.id] = chk.checked; });
        const status = document.getElementById('statusDistribusiSelect').value;
        const res = await apiCall('updateChecklist', { idDistribusi: window._currentDistribusiId, checklistJson: JSON.stringify(checklist), status });
        if (res.status === 'success') {
            alert('Checklist disimpan');
            bootstrap.Modal.getInstance(document.getElementById('distribusiModal')).hide();
            loadDistribusi();
        } else alert('Gagal: ' + res.message);
    });

    const pages = { dashboard: loadDashboard, penerima: loadPenerima, distribusi: loadDistribusi };
    document.querySelectorAll('.sidebar a[data-page]').forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
            link.classList.add('active');
            pages[link.dataset.page]();
        });
    });
    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
        e.preventDefault();
        if (confirm('Logout?')) await logout();
    });
</script>
</body>
</html>
